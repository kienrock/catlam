<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Kiên K80 - Giao Diện Chuẩn</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f6f8; color: #333; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #888; font-size: 16px; font-weight: bold; }
        .tab.active { color: #007bff; border-bottom: 3px solid #007bff; }
        .content { display: none; padding: 10px; max-width: 600px; margin: auto; }
        .content.active { display: block; }
        
        /* Nhập liệu */
        .group { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .in-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .label-text { width: 95px; font-size: 15px; font-weight: bold; color: #555; flex-shrink: 0; }
        input { border: 1px solid #ddd; border-radius: 5px; padding: 12px; font-size: 18px; text-align: right; width: 100%; box-sizing: border-box; }

        /* TỔNG HỢP THÁNG 4 CỘT CÂN ĐỐI */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 4px; }
        .s-card { background: white; padding: 8px 1px; border-radius: 6px; text-align: center; border-top: 3px solid #007bff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); min-height: 55px; display: flex; flex-direction: column; justify-content: center; }
        .s-card span { font-size: 9px; color: #666; font-weight: bold; display: block; margin-bottom: 3px; text-transform: uppercase; line-height: 1.1; }
        .s-card b { font-size: 13px; display: block; color: #000; } 
        .ck-row-flex { display: flex; justify-content: center; gap: 4px; font-size: 9px; color: #6f42c1; margin-top: 2px; border-top: 1px dashed #eee; padding-top: 2px; }
        
        .plus { color: #2ecc71 !important; font-weight: bold; }
        .minus { color: #ff4d4d !important; font-weight: bold; }
        .txt-avg { color: #17a2b8 !important; }

        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px 4px; text-align: right; }
        th { background: #f8f9fa; font-weight: bold; text-align: center; font-size: 13px; }
        .link-edit { color: #007bff; text-decoration: underline; font-weight: bold; cursor: pointer; }

        .btn-save { background: #28a745; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-print { background: #343a40; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        
        .diff-container { background: #343a40; color: white; padding: 12px; border-radius: 10px; text-align: center; margin: 10px 0; }
        #diff-val { font-size: 32px; font-weight: 900; }

        @media print {
            header, .tabs, .btn-save, .btn-print, #report, button, .tab { display: none !important; }
            body { background: white !important; color: #000 !important; filter: brightness(0) contrast(1000%) !important; }
            @page { size: 80mm auto; margin: 0; }
            #input { display: block !important; width: 100% !important; padding: 0; margin: 0; }
            .group { box-shadow: none !important; border-bottom: 2px solid #000 !important; padding: 1px 0 !important; margin: 0 !important; border-radius: 0 !important; line-height: 1.0 !important; }
            .in-row { display: flex !important; line-height: 1.0 !important; padding: 1px 0 !important; }
            .label-text { font-size: 14px !important; font-weight: 900 !important; width: 110px !important; }
            input { border: none !important; font-weight: 900 !important; font-size: 18px !important; text-align: right !important; background: transparent !important; flex: 1 !important; }
            .diff-container { background: white !important; border: 3px solid #000 !important; padding: 5px 0 !important; }
            #input::before { content: "BIÊN LAI CHỐT TIỀN"; display: block; text-align: center; font-weight: 900; font-size: 20px; border-bottom: 3px solid #000; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="tabs">
    <div id="tab-in" class="tab active" onclick="openTab('input', this)">NHẬP LIỆU</div>
    <div id="tab-re" class="tab" onclick="openTab('report', this)">TỔNG HỢP</div>
</div>

<div id="input" class="content active">
    <div class="group"><div class="in-row"><span class="label-text">Ngày:</span><input type="date" id="date"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng DT:</span><input type="number" id="total_rev" oninput="cal()" placeholder="0"></div></div>
    
    <div class="group">
        <div class="in-row"><span class="label-text">Shopee:</span><input type="number" id="shopee" oninput="cal()" placeholder="0"></div>
        <div class="in-row"><span class="label-text">Grab:</span><input type="number" id="grab" oninput="cal()" placeholder="0"></div>
        <div class="in-row"><span class="label-text">Be:</span><input type="number" id="be" oninput="cal()" placeholder="0"></div>
    </div>
    
    <div class="group">
        <div class="in-row"><span class="label-text">CK (TCB):</span><input type="number" id="ck_tcb" oninput="cal()" placeholder="0"></div>
        <div class="in-row"><span class="label-text">CK (VCB):</span><input type="number" id="ck_vcb" oninput="cal()" placeholder="0"></div>
    </div>
    
    <div class="group"><div class="in-row"><span class="label-text">Tiền mặt:</span><input type="number" id="cash" oninput="cal()" placeholder="0"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng chi:</span><input type="number" id="expense" oninput="cal()" placeholder="0"></div></div>
    
    <div class="group" id="other_group">
        <div class="in-row" style="justify-content: space-between;">
            <span class="label-text">Khoản Khác:</span>
            <button onclick="addOtherRow()" style="background:#007bff; color:white; border:none; border-radius:50%; width:30px; height:30px; font-size:20px">+</button>
        </div>
        <div id="other_list">
            <div style="display:flex; gap:5px; margin-bottom:5px">
                <input type="number" class="other-val" style="width:40%" oninput="cal()" placeholder="Tiền">
                <input type="text" class="other-note" style="width:60%" placeholder="Ghi chú">
            </div>
        </div>
    </div>

    <div class="diff-container">
        <b id="diff-val">0</b>
        <span id="status-label" style="font-weight:bold; font-size:15px; display:block">--</span>
    </div>

    <button id="btnSave" class="btn-save" onclick="send()">LƯU DỮ LIỆU</button>
    <button class="btn-print" onclick="window.print()">🖨️ IN BIÊN LAI (K80)</button>
</div>

<div id="report" class="content">
    <div style="text-align:center; margin-bottom:12px"><input type="month" id="m-filter" onchange="load()" style="padding:10px; font-size:16px; border:1px solid #ddd; border-radius:5px;"></div>
    
    <div class="summary-grid">
        <div class="s-card"><span>Tổng DT</span><b id="sum-r">0</b></div>
        <div class="s-card"><span>APPs</span><b id="sum-apps">0</b></div>
        <div class="s-card">
            <span>CK (Tổng)</span><b id="sum-ck-all">0</b>
            <div class="ck-row-flex">T:<i id="sum-tcb">0</i> V:<i id="sum-vcb">0</i></div>
        </div>
        <div class="s-card"><span>TM</span><b id="sum-tm">0</b></div>
    </div>
    
    <div class="summary-grid">
        <div class="s-card" style="border-top-color: #17a2b8;"><span>DT TB / Ngày</span><b id="sum-avg" class="txt-avg">0</b></div>
        <div class="s-card" style="border-top-color: #dc3545;"><span>Chi</span><b id="sum-e">0</b></div>
        <div class="s-card" style="border-top-color: #ffc107;"><span>Chênh</span><b id="sum-d">0</b></div>
        <div class="s-card" style="border:none; background:transparent; box-shadow:none;"></div> </div>

    <table>
        <thead><tr><th>Ngày</th><th>Chênh</th><th>DT</th><th>Chi</th></tr></thead>
        <tbody id="res"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKfN7dfS3YKL7ecXLMZtAH0cF2klbxVQM4nsrI5pNH2pLFDvlzKTkRbHOU9ujxT0ZM/exec";
    const fmt = new Intl.NumberFormat();

    function addOtherRow() {
        const div = document.createElement('div');
        div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '5px';
        div.innerHTML = `<input type="number" class="other-val" style="width:40%" oninput="cal()" placeholder="Tiền"><input type="text" class="other-note" style="width:60%" placeholder="Ghi chú">`;
        document.getElementById('other_list').appendChild(div);
    }

    function cal() {
        const g = (id) => parseFloat(document.getElementById(id).value) || 0;
        let ot = 0; document.querySelectorAll('.other-val').forEach(el => ot += parseFloat(el.value) || 0);
        const diff = (g('shopee') + g('grab') + g('be') + g('ck_tcb') + g('ck_vcb') + g('cash') + g('expense') + ot) - g('total_rev');
        document.getElementById('diff-val').innerText = fmt.format(Math.round(diff));
        const lb = document.getElementById('status-label');
        lb.innerText = diff > 0 ? "DƯƠNG TIỀN (+)" : (diff < 0 ? "ÂM TIỀN (-)" : "BẰNG KHÍT");
        lb.className = diff > 0 ? "plus" : (diff < 0 ? "minus" : "");
    }

    async function send() {
        const b = document.getElementById('btnSave'); b.disabled = true; b.innerText = "ĐANG LƯU...";
        const g = (id) => parseFloat(document.getElementById(id).value) || 0;
        let notes = []; document.querySelectorAll('#other_list div').forEach(row => {
            let v = row.querySelector('.other-val').value; let n = row.querySelector('.other-note').value;
            if(v) notes.push(`${n}(${v}k)`);
        });
        let ot = 0; document.querySelectorAll('.other-val').forEach(el => ot += parseFloat(el.value) || 0);
        const p = { date: "'" + document.getElementById('date').value, total_rev: g('total_rev'), shopee: g('shopee'), grab: g('grab'), be: g('be'), ck_tcb: g('ck_tcb'), ck_vcb: g('ck_vcb'), cash: g('cash'), expense: g('expense'), other: ot, note: notes.join(", "), diff: document.getElementById('diff-val').innerText.replace(/,/g,'') };
        try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) }); alert("Đã lưu!"); location.reload(); } catch (e) { b.disabled = false; b.innerText = "LƯU DỮ LIỆU"; }
    }

    function openTab(n, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(n).classList.add('active'); if(el) el.classList.add('active');
        if(n === 'report') load();
    }

    function safeFormatDate(rawStr) {
        if(!rawStr) return "??";
        let s = rawStr.toString().substring(0, 10);
        let p = s.split(/[-/]/);
        if(p.length < 3) return s;
        let dObj = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
        let day = p[2];
        let thuArr = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
        return `${day} (${thuArr[dObj.getDay()]})`;
    }

    async function load() {
        const fMonth = document.getElementById('m-filter').value;
        const b = document.getElementById('res'); b.innerHTML = '<tr><td colspan="4">Tải...</td></tr>';
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json(); window.rawD = data;
            let h = '', sR = 0, sA = 0, sT = 0, sV = 0, sTM = 0, sE = 0, sD = 0, count = 0;
            data.filter(x => x[0] && x[0].toString().startsWith(fMonth)).reverse().forEach(x => {
                const rv = parseFloat(x[1])||0, tcb = parseFloat(x[5])||0, vcb = parseFloat(x[6])||0, tm = parseFloat(x[7])||0, chi = parseFloat(x[8])||0, kha = parseFloat(x[9])||0, lek = parseFloat(x[10])||0;
                sR += rv; sA += (parseFloat(x[2])||0+parseFloat(x[3])||0+parseFloat(x[4])||0);
                sT += tcb; sV += vcb; sTM += tm; sE += (chi+kha); sD += lek; count++;
                let clrClass = lek > 0 ? 'plus' : (lek < 0 ? 'minus' : '');
                h += `<tr><td class="link-edit" onclick="viewBack('${x[0]}')">${safeFormatDate(x[0])}</td><td class="${clrClass}">${lek > 0 ? '+' : ''}${fmt.format(Math.round(lek))}</td><td>${fmt.format(Math.round(rv))}</td><td>${fmt.format(Math.round(chi+kha))}</td></tr>`;
            });
            b.innerHTML = h || '<tr><td colspan="4">Trống</td></tr>';
            document.getElementById('sum-r').innerText = fmt.format(Math.round(sR));
            document.getElementById('sum-apps').innerText = fmt.format(Math.round(sA));
            document.getElementById('sum-ck-all').innerText = fmt.format(Math.round(sT+sV));
            document.getElementById('sum-tcb').innerText = fmt.format(Math.round(sT));
            document.getElementById('sum-vcb').innerText = fmt.format(Math.round(sV));
            document.getElementById('sum-tm').innerText = fmt.format(Math.round(sTM));
            document.getElementById('sum-e').innerText = fmt.format(Math.round(sE));
            const dEl = document.getElementById('sum-d');
            dEl.innerText = (sD > 0 ? "+" : "") + fmt.format(Math.round(sD));
            dEl.className = sD > 0 ? "plus" : (sD < 0 ? "minus" : "");
            document.getElementById('sum-avg').innerText = count > 0 ? fmt.format(Math.round(sR / count)) : "0";
        } catch(e) { b.innerHTML = '<tr><td colspan="4">Lỗi tải!</td></tr>'; }
    }

    function viewBack(rawStr) {
        const r = window.rawD.find(i => i[0].toString() === rawStr.toString()); if(!r) return;
        document.getElementById('date').value = rawStr.toString().substring(0, 10).replace(/\//g, '-'); 
        document.getElementById('total_rev').value = r[1];
        document.getElementById('shopee').value = r[2]; document.getElementById('grab').value = r[3]; document.getElementById('be').value = r[4];
        document.getElementById('ck_tcb').value = r[5]; document.getElementById('ck_vcb').value = r[6]; document.getElementById('cash').value = r[7]; document.getElementById('expense').value = r[8];
        document.getElementById('other_list').innerHTML = `<div style="display:flex; gap:5px; margin-bottom:5px"><input type="number" class="other-val" style="width:40%" value="${r[9]||''}" oninput="cal()"><input type="text" class="other-note" style="width:60%" value="${r[11]||''}"></div>`;
        cal(); openTab('input', document.getElementById('tab-in'));
    }

    const today = new Date();
    document.getElementById('date').value = today.toLocaleDateString('en-CA');
    document.getElementById('m-filter').value = today.toISOString().substring(0, 7);
</script>
</body>
</html>
