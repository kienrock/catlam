<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Kiên K80 - Chốt Tiền</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f6f8; color: #333; }
        .header { background: #007bff; color: white; padding: 10px; text-align: center; font-weight: bold; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #888; font-size: 14px; font-weight: bold; }
        .tab.active { color: #007bff; border-bottom: 3px solid #007bff; }
        .content { display: none; padding: 10px; max-width: 500px; margin: auto; }
        .content.active { display: block; }

        .group { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .in-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; justify-content: space-between; }
        .label-text { font-size: 13px; font-weight: bold; color: #555; }
        input { border: 1px solid #ddd; border-radius: 5px; padding: 10px; font-size: 16px; text-align: right; width: 60%; }
        input.note { width: 100%; text-align: left; font-size: 12px; background: #f9f9f9; margin-top: 5px; }
        
        .btn-save { background: #28a745; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-print { background: #343a40; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        
        /* KHỐI CHÊNH LỆCH CĂN GIỮA */
        .diff-container { background: #343a40; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; }
        .diff-label { font-size: 14px; color: #ccc; display: block; margin-bottom: 2px; }
        #diff-val { font-size: 32px; font-weight: 900; display: block; line-height: 1.1; margin: 5px 0; }
        .status-small { font-size: 13px; font-weight: bold; display: block; opacity: 0.9; }

        .txt-do { color: #ff4d4d; } .txt-xanh { color: #2ecc71; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .s-card { background: white; padding: 10px 2px; border-radius: 8px; text-align: center; border-top: 4px solid #007bff; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 5px; text-align: right; }

        /* CẤU HÌNH IN K80 */
        @media print {
            header, .header, .tabs, .btn-save, .btn-print, #report, .note, button, .tab { display: none !important; }
            #input { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            body { background: white; color: black !important; }
            @page { size: 80mm auto; margin: 0; }
            
            .group { box-shadow: none !important; border-bottom: 1px dashed black !important; padding: 6px 0 !important; margin: 0 !important; }
            .in-row { padding: 4px 0 !important; }
            .label-text { font-size: 15px !important; color: black !important; }
            
            input { border: none !important; background: transparent !important; font-weight: 900 !important; font-size: 18px !important; color: black !important; text-align: right !important; }

            .diff-container { 
                background: white !important; 
                border: 3px solid black !important; 
                color: black !important; 
                padding: 10px 0 !important; 
                margin-top: 10px !important;
                display: block !important;
            }
            #diff-val { font-size: 36px !important; color: black !important; text-align: center !important; }
            .status-small { color: black !important; font-size: 16px !important; text-align: center !important; }
            
            #input::before { 
                content: "CHỐT TIỀN CUỐI NGÀY"; 
                display: block; 
                text-align: center; 
                font-weight: 900; 
                font-size: 20px; 
                border-bottom: 2px solid black;
                margin-bottom: 10px;
                padding-bottom: 8px;
            }
        }
    </style>
</head>
<body>

<div class="header">QUẢN LÝ THU CHI KIÊN</div>
<div class="tabs">
    <div id="tab-in" class="tab active" onclick="openTab('input', this)">NHẬP LIỆU</div>
    <div id="tab-re" class="tab" onclick="openTab('report', this)">TỔNG HỢP</div>
</div>

<div id="input" class="content active">
    <div class="group"><div class="in-row"><span class="label-text">Ngày:</span><input type="date" id="date"></div></div>
    <div class="group">
        <div class="in-row"><span class="label-text">Tổng Doanh Thu:</span><input type="number" id="total_rev" oninput="cal()"></div>
        <input type="text" id="n_rev" class="note" placeholder="Ghi chú doanh thu...">
    </div>
    <div class="group">
        <div class="in-row"><span class="label-text">Tiền App Shopee:</span><input type="number" id="shopee" oninput="cal()"></div>
        <div class="in-row"><span class="label-text">Tiền App Grab:</span><input type="number" id="grab" oninput="cal()"></div>
        <div class="in-row"><span class="label-text">Tiền App Be:</span><input type="number" id="be" oninput="cal()"></div>
    </div>
    <div class="group">
        <div class="in-row"><span class="label-text">Bank Chuyển Khoản:</span><input type="number" id="transfer" oninput="cal()"></div>
        <div class="in-row"><span class="label-text">Tiền Mặt Thực Tế:</span><input type="number" id="cash" oninput="cal()"></div>
    </div>
    <div class="group">
        <div class="in-row"><span class="label-text">Tổng Chi:</span><input type="number" id="expense" oninput="cal()"></div>
        <div class="in-row"><span class="label-text">Khoản Khác:</span><input type="number" id="other_val" oninput="cal()"></div>
        <input type="text" id="n_other" class="note" placeholder="Ghi chú chi khác...">
    </div>
    
    <div class="diff-container">
        <span class="diff-label">Chênh lệch</span>
        <b id="diff-val">0</b>
        <span id="status-label" class="status-small">--</span>
    </div>
    
    <button id="btnSave" class="btn-save" onclick="send()">LƯU DỮ LIỆU</button>
    <button class="btn-print" onclick="window.print()">🖨️ IN BIÊN LAI (K80)</button>
</div>

<div id="report" class="content">
    <div style="background:white; padding:10px; border-radius:8px; margin-bottom:10px; text-align:center">
        <label style="font-weight:bold; font-size:13px">Tháng: </label>
        <input type="month" id="m-filter" onchange="load()" style="padding:8px; border-radius:5px; border:1px solid #ddd">
    </div>

    <div class="summary-grid">
        <div class="s-card"><span>Tổng DT</span><b id="sum-r" style="color:#28a745">0</b></div>
        <div class="s-card"><span>Tổng Chi</span><b id="sum-e" style="color:#dc3545">0</b></div>
        <div class="s-card"><span>Chênh Lệch</span><b id="sum-d">0</b></div>
    </div>

    <table>
        <thead><tr><th style="text-align:left">Ngày</th><th>Chênh</th><th>DT</th><th>Chi</th></tr></thead>
        <tbody id="res"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBLmOxhMLN5mc1iM0w4-jFzAUubEEpxE2LFjsFmwQVkAYWnfOTb-R5cA9Vy3AHKwsu/exec";

    const d = new Date();
    document.getElementById('date').value = d.toLocaleDateString('en-CA');
    document.getElementById('m-filter').value = d.toISOString().slice(0, 7);

    function cal() {
        const gV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const diff = gV('total_rev') - (gV('shopee')+gV('grab')+gV('be')) - gV('transfer') - gV('cash') - gV('expense') - gV('other_val');
        document.getElementById('diff-val').innerText = new Intl.NumberFormat().format(diff.toFixed(0));
        const lb = document.getElementById('status-label');
        if (diff > 0) { lb.innerText = "ÂM TIỀN (HỤT)"; lb.className = "status-small txt-do"; }
        else if (diff < 0) { lb.innerText = "DƯƠNG TIỀN (DƯ)"; lb.className = "status-small txt-xanh"; }
        else { lb.innerText = "BẰNG"; lb.className = "status-small"; }
    }

    async function send() {
        const b = document.getElementById('btnSave'); b.disabled = true; b.innerText = "ĐANG LƯU...";
        const payload = {
            date: document.getElementById('date').value,
            total_rev: document.getElementById('total_rev').value || 0,
            shopee: document.getElementById('shopee').value||0, grab: document.getElementById('grab').value||0, be: document.getElementById('be').value||0,
            transfer: document.getElementById('transfer').value||0, cash: document.getElementById('cash').value||0,
            expense: document.getElementById('expense').value||0, other: document.getElementById('other_val').value||0,
            diff: document.getElementById('diff-val').innerText.replace(/,/g,''), 
            note: document.getElementById('n_rev').value + " | " + document.getElementById('n_other').value
        };
        try {
            const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(await r.text()); location.reload();
        } catch (e) { alert("Lỗi!"); b.disabled = false; b.innerText = "LƯU LẠI"; }
    }

    function openTab(n, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(n).classList.add('active');
        el.classList.add('active');
        if(n === 'report') load();
    }

    async function load() {
        const fMonth = document.getElementById('m-filter').value;
        const b = document.getElementById('res'); b.innerHTML = '<tr><td colspan="4">Tải...</td></tr>';
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json(); window.rawD = data; 
            let h = '', sR = 0, sE = 0, sD = 0;
            data.filter(x => x[0] && x[0].toString().startsWith(fMonth)).reverse().forEach(x => {
                const dv = parseFloat(x[9])||0, rv = parseFloat(x[1])||0, ev = (parseFloat(x[7])||0)+(parseFloat(x[8])||0);
                sR += rv; sE += ev; sD += dv;
                h += `<tr><td style="text-align:left; color:#007bff; text-decoration:underline; font-weight:bold" onclick="viewBack('${x[0]}')">${x[0].split('-')[2]}</td><td class="${dv>0?'txt-do':'txt-xanh'}">${new Intl.NumberFormat().format(dv)}</td><td>${new Intl.NumberFormat().format(rv)}</td><td>${new Intl.NumberFormat().format(ev)}</td></tr>`;
            });
            b.innerHTML = h || '<tr><td colspan="4">Trống</td></tr>';
            document.getElementById('sum-r').innerText = new Intl.NumberFormat().format(sR);
            document.getElementById('sum-e').innerText = new Intl.NumberFormat().format(sE);
            const sumD = document.getElementById('sum-d');
            sumD.innerText = new Intl.NumberFormat().format(sD) + (sD > 0 ? " (Âm)" : (sD < 0 ? " (Dương)" : ""));
            sumD.className = sD > 0 ? "txt-do" : (sD < 0 ? "txt-xanh" : "");
        } catch(e) { b.innerHTML = '<tr><td colspan="4">Lỗi!</td></tr>'; }
    }

    function viewBack(dateStr) {
        const r = window.rawD.find(i => i[0].toString() === dateStr);
        if(!r) return;
        document.getElementById('date').value = r[0];
        document.getElementById('total_rev').value = r[1];
        document.getElementById('shopee').value = r[2]; document.getElementById('grab').value = r[3]; document.getElementById('be').value = r[4];
        document.getElementById('transfer').value = r[5]; document.getElementById('cash').value = r[6];
        document.getElementById('expense').value = r[7]; document.getElementById('other_val').value = r[8];
        const ns = (r[10] || "").split(" | ");
        document.getElementById('n_rev').value = ns[0] || "";
        document.getElementById('n_other').value = ns[1] || "";
        cal(); openTab('input', document.getElementById('tab-in'));
    }
</script>
</body>
</html>
