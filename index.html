<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIÊN K80 - FIX ĐỊNH DẠNG</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f6f8; }
        .header { background: #007bff; color: white; padding: 10px; text-align: center; font-weight: bold; }
        .tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #888; font-size: 14px; font-weight: bold; }
        .tab.active { color: #007bff; border-bottom: 4px solid #007bff; }
        .content { display: none; padding: 10px; max-width: 500px; margin: auto; }
        .content.active { display: block; }
        .group { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .in-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .label-text { width: 95px; font-size: 13px; font-weight: bold; color: #555; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; text-align: right; }
        .btn-save { background: #28a745; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-print { background: #6c757d; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .diff-container { background: #343a40; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-top: 10px; }
        .status-big { font-size: 1.2em; font-weight: bold; margin-top: 5px; display: block; }
        .txt-do { color: #e74c3c; } .txt-xanh { color: #2ecc71; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .s-card { background: white; padding: 12px 5px; border-radius: 8px; text-align: center; border-top: 4px solid #007bff; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 5px; text-align: right; }
        @media print { .header, .tabs, button, .btn-save, .btn-print, #report { display: none !important; } #input.content { display: block !important; width: 100% !important; } body { background: white; color: black; } @page { size: 80mm auto; margin: 0; } input { border: none !important; font-weight: bold !important; text-align: right !important; } }
    </style>
</head>
<body>
<div class="tabs"><div id="tab-in" class="tab active" onclick="openTab('input', this)">NHẬP LIỆU</div><div id="tab-re" class="tab" onclick="openTab('report', this)">TỔNG HỢP</div></div>
<div id="input" class="content active">
    <div class="group"><div class="in-row"><span class="label-text">Ngày:</span><input type="date" id="date"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng DT:</span><input type="number" id="total_rev" oninput="cal()"></div><input type="text" id="n_rev" placeholder="Ghi chú DT..." style="width:100%; font-size:12px; margin-top:5px"></div>
    <div class="group"><div class="in-row"><span class="label-text">Shopee:</span><input type="number" id="shopee" oninput="cal()"></div><div class="in-row"><span class="label-text">Grab:</span><input type="number" id="grab" oninput="cal()"></div><div class="in-row"><span class="label-text">Be:</span><input type="number" id="be" oninput="cal()"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Bank CK:</span><input type="number" id="transfer" oninput="cal()"></div><div class="in-row"><span class="label-text">Tiền mặt:</span><input type="number" id="cash" oninput="cal()"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng chi:</span><input type="number" id="expense" oninput="cal()"></div><div class="in-row"><span class="label-text">Khác:</span><input type="number" id="other_val" oninput="cal()"></div></div>
    <div class="diff-container"><div style="display:flex; justify-content:space-between"><span>CHÊNH LỆCH:</span><b id="diff-val">0</b></div><span id="status-label" class="status-big">--</span></div>
    <button id="btnSave" class="btn-save" style="margin-top:15px" onclick="send()">LƯU DỮ LIỆU</button>
    <button class="btn-print" onclick="window.print()">🖨️ IN BIÊN LAI (K80)</button>
</div>
<div id="report" class="content">
    <div style="background:white; padding:10px; border-radius:8px; margin-bottom:15px"><label>Tháng:</label><input type="month" id="m-filter" onchange="load()" style="width:100%; text-align:center"></div>
    <div class="summary-grid"><div class="s-card"><span>Tổng DT</span><b id="sum-r" class="txt-xanh">0</b></div><div class="s-card"><span>Tổng Chi</span><b id="sum-e" class="txt-do">0</b></div><div class="s-card"><span>Chênh Lệch</span><b id="sum-d">0</b></div></div>
    <table><thead><tr><th style="text-align:left">Ngày</th><th>Chênh</th><th>DT</th><th>Chi</th></tr></thead><tbody id="res"></tbody></table>
</div>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9CS7yVzRuaL7dIN2YEb7WglofOYfuM1rZ8ws9-DNylynwehIplF6NSAiDGhMgjbOB/exec";
    document.getElementById('date').value = new Date().toLocaleDateString('en-CA');
    document.getElementById('m-filter').value = new Date().toISOString().slice(0, 7);
    function cal() {
        const gV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const diff = gV('total_rev') - (gV('shopee')+gV('grab')+gV('be')) - gV('transfer') - gV('cash') - gV('expense') - gV('other_val');
        document.getElementById('diff-val').innerText = new Intl.NumberFormat().format(diff.toFixed(0));
        const lb = document.getElementById('status-label');
        if (diff > 0) { lb.innerText = "ÂM TIỀN (HỤT)"; lb.className = "status-big txt-do"; }
        else if (diff < 0) { lb.innerText = "DƯƠNG TIỀN (DƯ)"; lb.className = "status-big txt-xanh"; }
        else { lb.innerText = "BẰNG"; lb.className = "status-big"; }
    }
    async function send() {
        const b = document.getElementById('btnSave'); b.disabled = true; b.innerText = "ĐANG LƯU...";
        const p = { date: document.getElementById('date').value, total_rev: document.getElementById('total_rev').value||0, shopee: document.getElementById('shopee').value||0, grab: document.getElementById('grab').value||0, be: document.getElementById('be').value||0, transfer: document.getElementById('transfer').value||0, cash: document.getElementById('cash').value||0, expense: document.getElementById('expense').value||0, other: document.getElementById('other_val').value||0, diff: document.getElementById('diff-val').innerText.replace(/,/g,''), note: document.getElementById('n_rev').value };
        try { const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) }); alert(await r.text()); location.reload(); } catch (e) { alert("Lỗi!"); b.disabled = false; }
    }
    function openTab(n, el) { document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(n).classList.add('active'); el.classList.add('active'); if(n === 'report') load(); }
    async function load() {
        const f = document.getElementById('m-filter').value;
        const b = document.getElementById('res'); b.innerHTML = 'Tải...';
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json(); window.rawD = data;
            let h = '', sR = 0, sE = 0, sD = 0;
            data.filter(x => x[0] && x[0].toString().startsWith(f)).reverse().forEach(x => {
                const dv = parseFloat(x[9])||0; sR += parseFloat(x[1])||0; sE += (parseFloat(x[7])||0)+(parseFloat(x[8])||0); sD += dv;
                h += `<tr><td style="text-align:left; color:#007bff; font-weight:bold" onclick="viewBack('${x[0]}')">${x[0].split('-')[2]}</td><td class="${dv>0?'txt-do':'txt-xanh'}">${new Intl.NumberFormat().format(dv)}</td><td>${new Intl.NumberFormat().format(x[1])}</td><td>${new Intl.NumberFormat().format(parseFloat(x[7])+parseFloat(x[8]))}</td></tr>`;
            });
            b.innerHTML = h || 'Trống';
            document.getElementById('sum-r').innerText = new Intl.NumberFormat().format(sR);
            document.getElementById('sum-e').innerText = new Intl.NumberFormat().format(sE);
            const sumD = document.getElementById('sum-d');
            sumD.innerText = new Intl.NumberFormat().format(sD) + (sD > 0 ? " (Âm tiền)" : (sD < 0 ? " (Dương tiền)" : ""));
            sumD.className = sD > 0 ? "txt-do" : (sD < 0 ? "txt-xanh" : "");
        } catch(e) { b.innerHTML = 'Lỗi!'; }
    }
    function viewBack(d) {
        const r = window.rawD.find(i => i[0].toString() === d); if(!r) return;
        document.getElementById('date').value = r[0]; document.getElementById('total_rev').value = r[1]; document.getElementById('shopee').value = r[2]; document.getElementById('grab').value = r[3]; document.getElementById('be').value = r[4]; document.getElementById('transfer').value = r[5]; document.getElementById('cash').value = r[6]; document.getElementById('expense').value = r[7]; document.getElementById('other_val').value = r[8]; document.getElementById('n_rev').value = r[10] || ""; cal(); openTab('input', document.getElementById('tab-in'));
    }
</script>
</body>
</html>
