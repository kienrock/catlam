<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Kiên K80 - Fix Làm Tròn</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f6f8; color: #333; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #888; font-size: 14px; font-weight: bold; }
        .tab.active { color: #007bff; border-bottom: 3px solid #007bff; }
        .content { display: none; padding: 10px; max-width: 600px; margin: auto; }
        .content.active { display: block; }

        /* Giao diện nhập liệu */
        .group { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .in-row { display: flex; gap: 10px; margin-bottom: 4px; align-items: center; }
        .label-text { width: 100px; font-size: 13px; font-weight: bold; color: #555; flex-shrink: 0; }
        .input-wrapper { flex: 1; display: flex; align-items: center; gap: 5px; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 10px; font-size: 16px; text-align: right; box-sizing: border-box; width: 100%; }
        input::placeholder { color: #ccc; font-style: italic; font-size: 13px; }
        
        .diff-container { background: #343a40; color: white; padding: 10px; border-radius: 10px; text-align: center; margin-top: 8px; }
        #diff-val { font-size: 28px; font-weight: 900; line-height: 1; }
        .txt-do { color: #ff4d4d !important; } .txt-xanh { color: #2ecc71 !important; }

        .btn-save { background: #28a745; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-print { background: #343a40; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 8px; cursor: pointer; }

        /* Bảng tổng hợp */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 12px; }
        .s-card { background: white; padding: 10px 2px; border-radius: 6px; text-align: center; border-top: 4px solid #007bff; }
        .s-card span { font-size: 9px; color: #666; font-weight: bold; display: block; margin-bottom: 4px; }
        .s-card b { font-size: 12px; display: block; }
        
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; border: 1px solid #eee; }
        th, td { border: 1px solid #eee; padding: 10px 4px; text-align: right; }
        th:first-child, td:first-child { width: 70px; text-align: center; }
        .link-edit { color: #007bff; text-decoration: underline; font-weight: bold; cursor: pointer; display: block; font-size: 11px; }

        @media print {
            header, .tabs, .btn-save, .btn-print, #report, .tab { display: none !important; }
            body { background: white !important; color: #000 !important; font-weight: 900 !important; margin: 0; }
            @page { size: 80mm auto; margin: 0; }
            .group { box-shadow: none !important; border: none !important; border-bottom: 1.5px solid #000 !important; padding: 1px 0 !important; margin: 0 !important; }
            input { border: none !important; font-weight: 900 !important; font-size: 16px !important; text-align: right !important; }
            #input::before { content: "CHỐT TIỀN CUỐI NGÀY"; display: block; text-align: center; font-weight: 900; font-size: 18px; border-bottom: 2px solid #000; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="tabs">
    <div id="tab-in" class="tab active" onclick="openTab('input', this)">NHẬP LIỆU</div>
    <div id="tab-re" class="tab" onclick="openTab('report', this)">TỔNG HỢP</div>
</div>

<div id="input" class="content active">
    <div class="group"><div class="in-row"><span class="label-text">Ngày:</span><div class="input-wrapper"><input type="date" id="date"></div></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng DT:</span><div class="input-wrapper"><input type="text" id="total_rev" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div></div>
    
    <div class="group">
        <div class="in-row"><span class="label-text">Shopee:</span><div class="input-wrapper"><input type="text" id="shopee" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div>
        <div class="in-row"><span class="label-text">Grab:</span><div class="input-wrapper"><input type="text" id="grab" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div>
        <div class="in-row"><span class="label-text">Be:</span><div class="input-wrapper"><input type="text" id="be" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div>
    </div>

    <div class="group"><div class="in-row"><span class="label-text">CK Bank:</span><div class="input-wrapper"><input type="text" id="transfer" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div></div>
    <div class="group">
        <div class="in-row">
            <span class="label-text">Tiền Mặt:</span>
            <div class="input-wrapper">
                <input type="text" id="cash" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)">
                <span class="icon-btn" onclick="openCashCounter()">💰</span>
            </div>
        </div>
    </div>
    <div class="group">
        <div class="in-row"><span class="label-text">Tổng chi:</span><div class="input-wrapper"><input type="text" id="expense" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div>
        <div class="in-row"><span class="label-text">Khoản Khác:</span><div class="input-wrapper"><input type="text" id="other_val" oninput="cal()" onfocus="toNum(this)" onblur="toFmt(this)" placeholder="(k)"></div></div>
    </div>

    <div class="diff-container">
        <div style="display:flex; align-items:baseline; justify-content:center; gap:3px">
            <b id="diff-val">0</b><span style="font-size:14px; font-weight:bold; color:#ccc">k</span>
        </div>
        <span id="status-label" style="font-weight:bold; font-size:12px">--</span>
    </div>
    
    <button id="btnSave" class="btn-save" onclick="send()">LƯU DỮ LIỆU</button>
    <button class="btn-print" onclick="window.print()">🖨️ IN BIÊN LAI (K80)</button>
</div>

<div id="cashModal" style="display:none;" class="modal">
    <div class="modal-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px"><b>💰 ĐẾM TIỀN (k)</b><span onclick="closeModal('cashModal')" style="cursor:pointer">✖</span></div>
        <div id="cashList"></div>
        <div style="border-top:1px solid #ddd; padding-top:8px; margin-top:8px">
            <div class="in-row"><span>Tổng:</span><b id="cash-total-raw">0</b>k</div>
            <div class="in-row" style="color:red"><span>Lại:</span><b>- 2.000</b>k</div>
            <div class="in-row" style="font-size:18px; color:#28a745"><span>MANG VỀ:</span><b id="cash-final">0</b>k</div>
        </div>
        <button class="btn-save" onclick="confirmCash()">XÁC NHẬN</button>
    </div>
</div>

<div id="report" class="content">
    <div style="text-align:center; margin-bottom:12px"><input type="month" id="m-filter" onchange="load()" style="padding:6px; border-radius:5px; border:1px solid #ddd"></div>
    <div class="summary-grid">
        <div class="s-card"><span>Tổng DT (k)</span><b id="sum-r" style="color:#28a745">0</b></div>
        <div class="s-card"><span>Tổng Chi (k)</span><b id="sum-e" style="color:#dc3545">0</b></div>
        <div class="s-card"><span>Chênh (k)</span><b id="sum-d">0</b></div>
        <div class="s-card" style="border-top-color:#ffc107"><span>TB/Ngày (k)</span><b id="sum-avg">0</b></div>
    </div>
    <table>
        <thead><tr><th>Ngày</th><th>Lệch (k)</th><th>DT (k)</th><th>Chi (k)</th></tr></thead>
        <tbody id="res"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBLmOxhMLN5mc1iM0w4-jFzAUubEEpxE2LFjsFmwQVkAYWnfOTb-R5cA9Vy3AHKwsu/exec";
    
    // Dùng dấu phẩy cho hàng nghìn để tránh lỗi thập phân trong code
    const fmt = new Intl.NumberFormat('en-US'); 

    function n(str) {
        if (!str) return 0;
        let clean = str.toString().replace(/[^0-9.-]/g, '');
        return Math.round(parseFloat(clean)) || 0; // LÀM TRÒN ĐẾN HÀNG ĐƠN VỊ
    }

    function toFmt(el) {
        let val = n(el.value);
        if (el.value !== "") el.value = fmt.format(val) + " k";
        cal();
    }

    function toNum(el) {
        let val = n(el.value);
        el.value = val === 0 ? "" : val;
    }

    const denominations = [{l:"500k",v:500},{l:"200k",v:200},{l:"100k",v:100},{l:"50k",v:50},{l:"20k",v:20},{l:"10k",v:10},{l:"5k",v:5},{l:"2k",v:2},{l:"1k",v:1}];
    let finalCashValue = 0;

    function init() {
        const list = document.getElementById('cashList');
        denominations.forEach(i => {
            list.innerHTML += `<div class="cash-row"><b>${i.l}</b> <input type="number" class="cash-input" style="width:60px" data-val="${i.v}" oninput="upCash()"> <span style="width:60px; text-align:right">0k</span></div>`;
        });
        const d = new Date();
        document.getElementById('date').value = d.toLocaleDateString('en-CA');
        document.getElementById('m-filter').value = d.toISOString().slice(0, 7);
    }

    function upCash() {
        let r = 0;
        document.querySelectorAll('.cash-input').forEach(i => {
            let s = (parseInt(i.dataset.val) * (parseInt(i.value) || 0));
            r += s; i.nextElementSibling.innerText = s + "k";
        });
        document.getElementById('cash-total-raw').innerText = fmt.format(r);
        finalCashValue = r - 2000;
        document.getElementById('cash-final').innerText = fmt.format(finalCashValue);
    }

    function confirmCash() { 
        document.getElementById('cash').value = fmt.format(finalCashValue) + " k";
        cal(); closeModal('cashModal'); 
    }
    function openCashCounter() {
