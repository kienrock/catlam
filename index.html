<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thu Chi Kiên - Fix</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f6f8; font-size: 14px; }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 48px; z-index: 99; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #888; }
        .tab.active { color: #007bff; border-bottom: 3px solid #007bff; font-weight: bold; }
        .content { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .content.active { display: block; }
        .group { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .title { font-size: 0.8em; font-weight: bold; color: #007bff; margin-bottom: 8px; display: block; }
        .in-row { display: flex; gap: 5px; margin-bottom: 8px; }
        input { flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        input.note { flex: 3; font-size: 12px; background: #f9f9f9; }
        .btn-save { background: #28a745; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .s-card { background: white; padding: 10px; border-radius: 8px; text-align: center; font-size: 0.7em; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 5px; text-align: right; }
        .txt-left { text-align: left; }
        .txt-green { color: #28a745; font-weight: bold; }
        .txt-red { color: #dc3545; font-weight: bold; }
        @media print {
            .header, .tabs, button, input, .filter-bar { display: none !important; }
            .content { display: block !important; width: 100% !important; margin: 0 !important; }
            @page { size: 80mm auto; margin: 0; }
            table { font-size: 11px !important; }
            td, th { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

<div class="header">QUẢN LÝ THU CHI</div>
<div class="tabs">
    <div class="tab active" onclick="openTab('input', this)">NHẬP LIỆU</div>
    <div class="tab" onclick="openTab('report', this)">TỔNG HỢP</div>
</div>

<div id="input" class="content active">
    <div class="group"><span class="title">Ngày</span><input type="date" id="date"></div>
    <div class="group"><span class="title">Doanh thu</span>
        <div class="in-row"><input type="number" id="total_rev" oninput="cal()"><input type="text" id="n_rev" class="note" placeholder="Ghi chú"></div>
    </div>
    <div class="group"><span class="title">App (Shopee/Grab/Be)</span>
        <div class="in-row"><input type="number" id="shopee" placeholder="Shopee" oninput="cal()"><input type="text" id="n_shopee" class="note"></div>
        <div class="in-row"><input type="number" id="grab" placeholder="Grab" oninput="cal()"><input type="text" id="n_grab" class="note"></div>
        <div class="in-row"><input type="number" id="be" placeholder="Be" oninput="cal()"><input type="text" id="n_be" class="note"></div>
    </div>
    <div class="group"><span class="title">CK & Tiền mặt</span>
        <div class="in-row"><input type="number" id="transfer" placeholder="CK" oninput="cal()"><input type="text" id="n_transfer" class="note"></div>
        <div class="in-row"><input type="number" id="cash" placeholder="TM" oninput="cal()"><input type="text" id="n_cash" class="note"></div>
    </div>
    <div class="group"><span class="title">Chi & Khác</span>
        <div class="in-row"><input type="number" id="expense" placeholder="Chi" oninput="cal()"><input type="text" id="n_expense" class="note"></div>
        <div id="other-list"></div>
        <button onclick="addOther()" style="width:100%; border:1px dashed #ccc; background:none; padding:8px; border-radius:5px">+ Thêm Khác</button>
    </div>
    <div style="background:#333; color:#fff; padding:15px; border-radius:8px; display:flex; justify-content:space-between">
        <span>CHÊNH LỆCH:</span><b id="diff-val">0</b>
    </div>
    <button id="btnSave" class="btn-save" style="margin-top:15px" onclick="send()">LƯU DỮ LIỆU</button>
</div>

<div id="report" class="content">
    <div class="filter-bar" style="margin-bottom:10px">
        <label>Tháng:</label><input type="month" id="m-filter" onchange="load()">
    </div>
    <div class="summary-grid">
        <div class="s-card">DT<br><b id="sum-r" class="txt-green">0</b></div>
        <div class="s-card">Chi/K<br><b id="sum-e" class="txt-red">0</b></div>
        <div class="s-card">Chênh<br><b id="sum-d">0</b></div>
    </div>
    <button onclick="window.print()" style="width:100%; padding:10px; margin-bottom:10px">🖨️ IN K80</button>
    <table>
        <thead><tr><th class="txt-left">Ngày</th><th>Chênh</th><th>DT</th><th>Chi</th></tr></thead>
        <tbody id="res"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlayEKgxe5PJbmePdYJf0Lm6IMJ9X36IUevkyzNcEtcy71h44RFMxmtExpwT4fhzOT/exec";

    // Khởi tạo ngày
    const dObj = new Date();
    document.getElementById('date').value = dObj.toISOString().split('T')[0];
    document.getElementById('m-filter').value = dObj.toISOString().slice(0, 7);

    function addOther() {
        const d = document.createElement('div'); d.className = 'in-row o-item';
        d.innerHTML = '<input type="number" class="o-amt" placeholder="Khác" oninput="cal()"><input type="text" class="o-note" placeholder="Ghi chú">';
        document.getElementById('other-list').appendChild(d);
    }
    addOther();

    function cal() {
        const gV = (id) => parseFloat(document.getElementById(id).value) || 0;
        let oS = 0; document.querySelectorAll('.o-amt').forEach(e => oS += (parseFloat(e.value) || 0));
        const diff = gV('total_rev') - (gV('shopee')+gV('grab')+gV('be')) - gV('transfer') - gV('cash') - gV('expense') - oS;
        document.getElementById('diff-val').innerText = new Intl.NumberFormat().format(diff.toFixed(0));
    }

    async function send() {
        const b = document.getElementById('btnSave'); b.disabled = true; b.innerText = "ĐANG GỬI...";
        let ns = [];
        ['rev','shopee','grab','be','transfer','cash','expense'].forEach(id => {
            let v = document.getElementById('n_'+id).value; if(v) ns.push(v);
        });
        let oS = 0; document.querySelectorAll('.o-item').forEach(e => {
            let a = e.querySelector('.o-amt').value; if(a) { oS += parseFloat(a); ns.push(e.querySelector('.o-note').value); }
        });

        const p = {
            date: document.getElementById('date').value,
            total_rev: document.getElementById('total_rev').value || 0,
            shopee: document.getElementById('shopee').value||0, grab: document.getElementById('grab').value||0, be: document.getElementById('be').value||0,
            transfer: document.getElementById('transfer').value||0, cash: document.getElementById('cash').value||0,
            expense: document.getElementById('expense').value||0, other: oS,
            diff: document.getElementById('diff-val').innerText.replace(/,/g,''), note: ns.join("; ")
        };

        try {
            const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) });
            alert(await r.text()); location.reload();
        } catch (e) { alert("Lỗi lưu dữ liệu!"); b.disabled = false; }
    }

    function openTab(tabId, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        if(tabId === 'report') load();
    }

    async function load() {
        const filterMonth = document.getElementById('m-filter').value; // yyyy-mm
        const b = document.getElementById('res'); 
        b.innerHTML = '<tr><td colspan="4">Đang tải dữ liệu...</td></tr>';
        
        try {
            const res = await fetch(SCRIPT_URL); 
            const data = await res.json(); 
            window.raw = data;
            
            let html = '', sR = 0, sE = 0, sD = 0;
            
            // Lọc chính xác theo chuỗi yyyy-mm
            const filtered = data.filter(row => row[0] && row[0].substring(0, 7) === filterMonth);

            filtered.reverse().forEach(row => {
                const dv = parseFloat(row[9])||0, rv = parseFloat(row[1])||0, ev = (parseFloat(row[7])||0)+(parseFloat(row[8])||0);
                sR += rv; sE += ev; sD += dv;
                
                const dDisplay = row[0].split('-')[2]; // Lấy phần Ngày

                html += `<tr>
                    <td class="txt-left" onclick="view('${row[0]}')" style="color:#007bff; text-decoration:underline; font-weight:bold">${dDisplay}</td>
                    <td class="${dv<0?'txt-green':(dv>0?'txt-red':'')}">${new Intl.NumberFormat().format(dv)}</td>
                    <td>${new Intl.NumberFormat().format(rv)}</td>
                    <td>${new Intl.NumberFormat().format(ev)}</td>
                </tr>`;
            });

            b.innerHTML = html || '<tr><td colspan="4">Tháng này chưa có dữ liệu</td></tr>';
            document.getElementById('sum-r').innerText = new Intl.NumberFormat().format(sR);
            document.getElementById('sum-e').innerText = new Intl.NumberFormat().format(sE);
            const sd = document.getElementById('sum-d');
            sd.innerText = new Intl.NumberFormat().format(sD);
            sd.className = sD < 0 ? "txt-green" : "txt-red";
        } catch(e) { b.innerHTML = 'Lỗi tải! Hãy kiểm tra kết nối.'; }
    }

    function view(dateStr) {
        const r = window.raw.find(i => i[0] === dateStr);
        if(!r) return;
        document.getElementById('date').value = r[0];
        document.getElementById('total_rev').value = r[1];
        document.getElementById('shopee').value = r[2]; 
        document.getElementById('grab').value = r[3]; 
        document.getElementById('be').value = r[4];
        document.getElementById('transfer').value = r[5]; 
        document.getElementById('cash').value = r[6];
        document.getElementById('expense').value = r[7]; 
        document.getElementById('other-list').innerHTML = '';
        addOther(); document.querySelector('.o-amt').value = r[8];
        document.getElementById('n_rev').value = r[10]; 
        cal(); 
        document.querySelectorAll('.tab')[0].click(); // Quay về Tab Nhập
    }
</script>
</body>
</html>
