<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Kiên K80 - Fix Tổng Hợp</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f6f8; color: #333; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #888; font-size: 14px; font-weight: bold; }
        .tab.active { color: #007bff; border-bottom: 3px solid #007bff; }
        .content { display: none; padding: 10px; max-width: 600px; margin: auto; }
        .content.active { display: block; }

        .group { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .in-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .label-text { width: 85px; font-size: 13px; font-weight: bold; color: #555; flex-shrink: 0; }
        input { border: 1px solid #ddd; border-radius: 5px; padding: 10px; font-size: 16px; text-align: right; width: 100%; box-sizing: border-box; }
        
        .other-item { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-add { background: #007bff; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; }

        .btn-save { background: #28a745; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .btn-print { background: #343a40; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        
        .diff-container { background: #343a40; color: white; padding: 10px; border-radius: 10px; text-align: center; margin-top: 8px; }
        #diff-val { font-size: 28px; font-weight: 900; }
        .txt-do { color: #ff4d4d !important; } .txt-xanh { color: #2ecc71 !important; }

        /* TỔNG HỢP GỌN */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px; }
        .s-card { background: white; padding: 8px 2px; border-radius: 6px; text-align: center; border-top: 3px solid #007bff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .s-card span { font-size: 9px; color: #666; font-weight: bold; display: block; margin-bottom: 3px; }
        .s-card b { font-size: 11px; display: block; }
        /* TCB VCB cùng dòng */
        .ck-row-flex { display: flex; justify-content: center; gap: 5px; font-size: 8px; color: #6f42c1; margin-top: 2px; border-top: 1px dashed #eee; padding-top: 2px; }

        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px 4px; text-align: right; }
        .link-edit { color: #007bff; text-decoration: underline; font-weight: bold; cursor: pointer; }

        @media print {
            header, .tabs, .btn-save, .btn-print, #report, button, .modal, .btn-add { display: none !important; }
            body { background: white !important; color: #000 !important; font-weight: 900 !important; margin: 0; padding: 0; }
            @page { size: 80mm auto; margin: 0; }
            #input { display: block !important; width: 100% !important; }
            .group { box-shadow: none !important; border-bottom: 1.5px solid #000 !important; padding: 1px 0 !important; margin: 0 !important; border-radius: 0 !important; }
            .in-row { padding: 1px 0 !important; margin: 0 !important; }
            input { border: none !important; font-weight: 900 !important; font-size: 16px !important; color: #000 !important; text-align: right !important; padding: 0 !important; }
            .diff-container { background: white !important; border: 2.5px solid #000 !important; padding: 2px 0 !important; margin-top: 5px !important; }
            #input::before { content: "CHỐT TIỀN CUỐI NGÀY"; display: block; text-align: center; font-weight: 900; font-size: 18px; border-bottom: 2px solid #000; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="tabs">
    <div id="tab-in" class="tab active" onclick="openTab('input', this)">NHẬP LIỆU</div>
    <div id="tab-re" class="tab" onclick="openTab('report', this)">TỔNG HỢP</div>
</div>

<div id="input" class="content active">
    <div class="group"><div class="in-row"><span class="label-text">Ngày:</span><input type="date" id="date"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng DT:</span><input type="number" id="total_rev" oninput="cal()" placeholder="0"></div></div>
    <div class="group">
        <div class="in-row"><span class="label-text">Shopee:</span><input type="number" id="shopee" oninput="cal()" placeholder="0"></div>
        <div class="in-row"><span class="label-text">Grab:</span><input type="number" id="grab" oninput="cal()" placeholder="0"></div>
        <div class="in-row"><span class="label-text">Be:</span><input type="number" id="be" oninput="cal()" placeholder="0"></div>
    </div>
    <div class="group">
        <div class="in-row"><span class="label-text">CK (TCB):</span><input type="number" id="ck_tcb" oninput="cal()" placeholder="0"></div>
        <div class="in-row"><span class="label-text">CK (VCB):</span><input type="number" id="ck_vcb" oninput="cal()" placeholder="0"></div>
    </div>
    <div class="group"><div class="in-row"><span class="label-text">Tiền mặt:</span><input type="number" id="cash" oninput="cal()" placeholder="0"></div></div>
    <div class="group"><div class="in-row"><span class="label-text">Tổng chi:</span><input type="number" id="expense" oninput="cal()" placeholder="0"></div></div>
    
    <div class="group" id="other_group">
        <div class="in-row" style="justify-content: space-between;">
            <span class="label-text">Khác:</span>
            <button class="btn-add" onclick="addOtherRow()">+</button>
        </div>
        <div id="other_list">
            <div class="other-item">
                <input type="number" class="other-val" style="width:40%" oninput="cal()" placeholder="Tiền">
                <input type="text" class="other-note" style="width:60%" placeholder="Ghi chú">
            </div>
        </div>
    </div>

    <div class="diff-container">
        <b id="diff-val">0</b>
        <span id="status-label" style="font-weight:bold; font-size:13px; display:block">--</span>
    </div>
    <button id="btnSave" class="btn-save" onclick="send()">LƯU DỮ LIỆU</button>
    <button class="btn-print" onclick="window.print()">🖨️ IN BIÊN LAI (K80)</button>
</div>

<div id="report" class="content">
    <div style="text-align:center; margin-bottom:10px"><input type="month" id="m-filter" onchange="load()" style="padding:6px; border:1px solid #ddd"></div>
    
    <div class="summary-grid">
        <div class="s-card"><span>Tổng DT</span><b id="sum-r">0</b></div>
        <div class="s-card"><span>APPs</span><b id="sum-apps">0</b></div>
        <div class="s-card">
            <span>CK (Tổng)</span><b id="sum-ck-all">0</b>
            <div class="ck-row-flex">
                <span>T:<i id="sum-tcb">0</i></span>
                <span>V:<i id="sum-vcb">0</i></span>
            </div>
        </div>
        <div class="s-card"><span>TM</span><b id="sum-tm">0</b></div>
    </div>
    <div class="summary-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="s-card" style="border-top-color: #dc3545;"><span>CHI</span><b id="sum-e">0</b></div>
        <div class="s-card" style="border-top-color: #ffc107;"><span>CHÊNH</span><b id="sum-d">0</b></div>
    </div>

    <table>
        <thead><tr><th>Ngày</th><th>Chênh</th><th>DT</th><th>Chi</th></tr></thead>
        <tbody id="res"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxou4Zw_OPasyc2zGFX2fWwnHWLUq5toUjz7ujelPfkaLzQHzo7JnE_Cb8oY47Bg3yc/exec";
    const fmt = new Intl.NumberFormat();

    function addOtherRow() {
        const div = document.createElement('div');
        div.className = 'other-item';
        div.innerHTML = `<input type="number" class="other-val" style="width:40%" oninput="cal()" placeholder="Tiền"><input type="text" class="other-note" style="width:60%" placeholder="Ghi chú">`;
        document.getElementById('other_list').appendChild(div);
    }

    function getOtherTotal() {
        let total = 0;
        document.querySelectorAll('.other-val').forEach(el => total += parseFloat(el.value) || 0);
        return total;
    }

    function cal() {
        const g = (id) => parseFloat(document.getElementById(id).value) || 0;
        const totalActual = g('shopee') + g('grab') + g('be') + g('ck_tcb') + g('ck_vcb') + g('cash') + g('expense') + getOtherTotal();
        const diff = totalActual - g('total_rev');
        document.getElementById('diff-val').innerText = fmt.format(diff.toFixed(0));
        const lb = document.getElementById('status-label');
        lb.innerText = diff > 0 ? "DƯƠNG TIỀN (+)" : (diff < 0 ? "ÂM TIỀN (-)" : "BẰNG KHÍT");
        lb.className = diff > 0 ? "txt-xanh" : (diff < 0 ? "txt-do" : "");
    }

    async function send() {
        const b = document.getElementById('btnSave'); b.disabled = true; b.innerText = "ĐANG LƯU...";
        const g = (id) => parseFloat(document.getElementById(id).value) || 0;
        let otherNotes = [];
        document.querySelectorAll('.other-item').forEach(row => {
            let v = row.querySelector('.other-val').value;
            let n = row.querySelector('.other-note').value;
            if(v) otherNotes.push(`${n}(${v}k)`);
        });

        const p = { 
            date: document.getElementById('date').value, 
            total_rev: g('total_rev'), shopee: g('shopee'), grab: g('grab'), be: g('be'), 
            ck_tcb: g('ck_tcb'), ck_vcb: g('ck_vcb'), cash: g('cash'), expense: g('expense'), 
            other: getOtherTotal(), note: otherNotes.join(", "),
            diff: document.getElementById('diff-val').innerText.replace(/,/g,'') 
        };
        try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) }); alert("Đã lưu!"); location.reload(); } catch (e) { b.disabled = false; }
    }

    function openTab(n, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(n).classList.add('active'); 
        if(el) el.classList.add('active');
        if(n === 'report') load();
    }

    async function load() {
        const fMonth = document.getElementById('m-filter').value;
        const b = document.getElementById('res'); b.innerHTML = 'Tải...';
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json(); window.rawD = data;
            let h = '', sR = 0, sApps = 0, sTCB = 0, sVCB = 0, sTM = 0, sE = 0, sD = 0, c = 0;
            data.filter(x => x[0] && x[0].toString().startsWith(fMonth)).reverse().forEach(x => {
                const rv = parseFloat(x[1])||0, tcb = parseFloat(x[5])||0, vcb = parseFloat(x[6])||0, tm = parseFloat(x[7])||0, chi = parseFloat(x[8])||0, kha = parseFloat(x[9])||0, lek = parseFloat(x[10])||0;
                sR += rv; sApps += (parseFloat(x[2])||0+parseFloat(x[3])||0+parseFloat(x[4])||0);
                sTCB += tcb; sVCB += vcb; sTM += tm; sE += (chi+kha); sD += lek; c++;
                let colorClass = lek > 0 ? 'txt-xanh' : (lek < 0 ? 'txt-do' : '');
                h += `<tr><td class="link-edit" onclick="viewBack('${x[0]}')">${x[0].split('-')[2]}</td><td class="${colorClass}">${fmt.format(lek)}</td><td>${fmt.format(rv)}</td><td>${fmt.format(chi+kha)}</td></tr>`;
            });
            b.innerHTML = h;
            document.getElementById('sum-r').innerText = fmt.format(sR);
            document.getElementById('sum-apps').innerText = fmt.format(sApps);
            document.getElementById('sum-ck-all').innerText = fmt.format(sTCB + sVCB);
            document.getElementById('sum-tcb').innerText = fmt.format(sTCB);
            document.getElementById('sum-vcb').innerText = fmt.format(sVCB);
            document.getElementById('sum-tm').innerText = fmt.format(sTM);
            document.getElementById('sum-e').innerText = fmt.format(sE);
            document.getElementById('sum-d').innerText = fmt.format(sD);
        } catch(e) { b.innerHTML = 'Lỗi!'; }
    }

    function viewBack(dateStr) {
        const r = window.rawD.find(i => i[0].toString() === dateStr);
        if(!r) return;
        document.getElementById('date').value = r[0];
        document.getElementById('total_rev').value = r[1];
        document.getElementById('shopee').value = r[2]; 
        document.getElementById('grab').value = r[3]; 
        document.getElementById('be').value = r[4];
        document.getElementById('ck_tcb').value = r[5]; 
        document.getElementById('ck_vcb').value = r[6];
        document.getElementById('cash').value = r[7];
        document.getElementById('expense').value = r[8];
        // Xóa danh sách Khác cũ và nạp lại (nếu có)
        document.getElementById('other_list').innerHTML = `<div class="other-item"><input type="number" class="other-val" style="width:40%" value="${r[9]||''}" oninput="cal()"><input type="text" class="other-note" style="width:60%" value="${r[11]||''}"></div>`;
        cal(); 
        openTab('input', document.getElementById('tab-in'));
    }

    const d = new Date();
    document.getElementById('date').value = d.toLocaleDateString('en-CA');
    document.getElementById('m-filter').value = d.toISOString().slice(0, 7);
    window.onload = () => { if(window.location.hash === '#report') openTab('report'); };
</script>
</body>
</html>
